<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="Car Tracker">
  <title>Car Tracker</title>
  <!--
    A UK number plate on the dossier green — this app's signature, replacing the Vite starter's logo.

    The colours are hardcoded and must be: a favicon is rendered by browser chrome, outside the document, so
    it can reach no CSS variable. They are copies of --head-bg and --plate-face/-ink/-edge from tokens.css,
    and this file is the single exemption tokens.test.ts grants. It does not theme, which is right twice over:
    browser chrome has no theme to follow, and a number plate is yellow in a dark room anyway.

    Deliberately wordless. At 16px any registration is mud; a yellow bar on green reads as "number plate" at a
    glance, which is the whole job.
  -->
  <rect width="48" height="48" rx="10" fill="#2F3D2C" />
  <rect x="7" y="17" width="34" height="14" rx="2.5" fill="#F5D416" stroke="#11140F" stroke-width="1.5" />
  <g fill="#101208">
    <rect x="11.5" y="21" width="3" height="6" rx="1" />
    <rect x="17" y="21" width="3" height="6" rx="1" />
    <rect x="25" y="21" width="3" height="6" rx="1" />
    <rect x="30.5" y="21" width="3" height="6" rx="1" />
    <rect x="36" y="21" width="3" height="6" rx="1" />
  </g>
</svg>
